# yaml-language-server: $schema=../../schemas/json/kind-cluster.json
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: app-1-cluster
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
  - role: worker
    image: kindest/node:v1.31.0
networking:
  ipFamily: ipv4
  disableDefaultCNI: false
  kubeProxyMode: iptables
featureGates:
  CSIMigration: true
