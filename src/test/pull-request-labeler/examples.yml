# yaml-language-server: $schema=../../schemas/json/pull-request-labeler.json
---
changed-files-labels-limit: 5
max-files-changed: '100'

frontend:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/frontend/**'
          - 'packages/ui/**'

backend:
  - all:
      - changed-files:
          - any-glob-to-any-file: 'src/backend/**'
      - base-branch: 'main'

mixed:
  - any:
      - head-branch: '^feature/'
      - changed-files:
          - all-globs-to-any-file:
              - 'src/mixed/**'
              - '!src/mixed/docs/**'

release:
  - base-branch:
      - 'main'
      - '^release/'
