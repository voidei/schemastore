# yaml-language-server: $schema=../../schemas/json/lsd-config.json

classic: false
blocks:
  - permission
  - name
  - size
  - date
  - git
color:
  when: auto
  theme: custom
date: date
dereference: false
display: visible-only
icons:
  when: auto
  theme: fancy
  separator: ' '
ignore-globs:
  - .git
  - node_modules
indicators: true
layout: grid
recursion:
  enabled: false
  depth: 2
size: short
permission: attributes
sorting:
  column: name
  reverse: false
  dir-grouping: last
no-symlink: false
total-size: false
hyperlink: auto
symlink-arrow: '->'
header: true
literal: true
truncate-owner:
  after: 24
  marker: '...'
