#:schema ../../schemas/json/git-cliff.json

"$schema" = "https://www.schemastore.org/git-cliff.json"
description = "Example git-cliff configuration"

[changelog]
header = "# Changelog\n"
body = """
{% if version %}
## {{ version }}
{% else %}
## Unreleased
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {{ commit.message }}
{% endfor %}
{% endfor %}
"""
footer = "<!-- generated by git-cliff -->"
trim = true
render_always = true
output = "CHANGELOG.md"
postprocessors = [
  { pattern = "<REPO>", replace = "https://github.com/orhun/git-cliff" },
  { pattern = ".*", replace_command = "cat" },
]

[git]
processing_order = [
  "commit_preprocessors",
  "split_commits",
  "conventional_commits",
  "commit_parsers",
  "link_parsers",
]
conventional_commits = true
require_conventional = false
filter_unconventional = true
split_commits = false
commit_preprocessors = [
  { pattern = "\\((\\w+\\s)?#([0-9]+)\\)", replace = "([#${2}](<REPO>/issues/${2}))" },
]
commit_parsers = [
  { message = "^feat", group = "Features", default_scope = "other" },
  { body = ".*security", group = "Security" },
  { footer = "^changelog: ?ignore", skip = true },
  { field = "author.name", pattern = "Jane Doe", group = "Jane's work" },
]
protect_breaking_commits = false
link_parsers = [
  { pattern = "#(\\d+)", href = "https://github.com/orhun/git-cliff/issues/$1" },
  { pattern = "RFC(\\d+)", text = "ietf-rfc$1", href = "https://datatracker.ietf.org/doc/html/rfc$1" },
]
filter_commits = false
fail_on_unmatched_commit = false
tag_pattern = "v[0-9].*"
skip_tags = "beta|alpha"
ignore_tags = "rc"
count_tags = "v[0-9].*"
use_branch_tags = false
topo_order = false
topo_order_commits = true
sort_commits = "oldest"
limit_commits = 42
recurse_submodules = false
include_paths = ["src/**", "docs/**/*.md"]
exclude_paths = ["target/**"]

[remote]
offline = false

[remote.github]
owner = "orhun"
repo = "git-cliff"
token = "example"
api_url = "https://api.github.com"
native_tls = false

[remote.gitlab]
owner = "archlinux"
repo = "arch-repro-status"
api_url = "https://gitlab.archlinux.org/api/v4"

[remote.gitea]
owner = "forgejo"
repo = "forgejo"

[remote.bitbucket]
owner = "workspace"
repo = "repository"

[remote.azure_devops]
owner = "organization"
repo = "project"

[bump]
features_always_bump_minor = true
breaking_always_bump_major = true
initial_tag = "0.1.0"
custom_major_increment_regex = "major"
custom_minor_increment_regex = "minor|more"
no_increment_regex = "chore|ci|docs"
bump_type = "minor"
