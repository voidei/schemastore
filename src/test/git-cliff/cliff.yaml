# yaml-language-server: $schema=../../schemas/json/git-cliff.json
changelog:
  body: |
    {% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group }}
    {% endfor %}
  trim: true
  render_always: false
  postprocessors:
    - pattern: '<REPO>'
      replace: 'https://github.com/orhun/git-cliff'
git:
  conventional_commits: true
  filter_unconventional: false
  split_commits: false
  commit_parsers:
    - message: '^feat'
      group: Features
    - sha: f6f2472bdf0bbb5f9fcaf2d72c1fa9f98f772bb2
      skip: true
  link_parsers:
    - pattern: '#(\d+)'
      href: 'https://github.com/orhun/git-cliff/issues/$1'
  sort_commits: newest
remote:
  offline: true
  github:
    owner: orhun
    repo: git-cliff
bump:
  bump_type: patch
