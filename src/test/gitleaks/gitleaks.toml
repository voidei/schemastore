#:schema ../../schemas/json/gitleaks.json

title = "gitleaks config"
description = "Example Gitleaks configuration"
minVersion = "v8.25.0"

[extend]
useDefault = true
disabledRules = ["generic-api-key"]

[[rules]]
id = "awesome-rule-1"
description = "awesome rule 1"
regex = '''one-go-style-regex-for-this-rule'''
secretGroup = 3
entropy = 3.5
path = '''a-file-path-regex'''
keywords = ["auth", "password", "token"]
tags = ["tag", "another tag"]

[[rules.allowlists]]
description = "ignore commit A"
condition = "OR"
commits = ["commit-A", "commit-B"]
paths = ['''go\.mod''', '''go\.sum''']
stopwords = ['''client''', '''endpoint''']

[[rules.allowlists]]
condition = "AND"
regexTarget = "match"
regexes = ['''(?i)parseur[il]''']
paths = ['''package-lock\.json''']

[[rules.required]]
id = "auxiliary-rule"
withinLines = 4
withinColumns = 3

[[rules]]
id = "auxiliary-rule"
description = "Auxiliary rule"
regex = '''username\s*=\s*"([^"]+)"'''
skipReport = true

[[rules]]
id = "gitlab-pat"

[[rules.allowlists]]
regexTarget = "line"
regexes = ['''MY-glpat-''']

[[allowlists]]
description = "global allow list"
commits = ["commit-A", "commit-B", "commit-C"]
paths = ['''gitleaks\.toml''', '''(.*?)(jpg|gif|doc)''']
regexTarget = "match"
regexes = ['''219-09-9999''', '''078-05-1120''']
stopwords = ['''client''', '''endpoint''']

[[allowlists]]
targetRules = ["awesome-rule-1", "auxiliary-rule"]
description = "Test assets"
paths = ['''tests/expected/._\.json$''']
