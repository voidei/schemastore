#:schema ../../schemas/json/lychee.json

verbose = "info"
format = "detailed"
mode = "emoji"
no_progress = false
output = ".config.dummy.report.md"
host_stats = true
dump = true
dump_inputs = true

cache = true
max_cache_age = "2d"
cache_exclude_status = "500.."

cookie_jar = "cookie-jar"
threads = 2
max_redirects = 10
max_retries = 2
max_concurrency = 14
default_extension = "md"
github_token = "secret"
index_files = ["index.html"]
preprocess = { command = "preprocess.sh" }

user_agent = "curl/7.83.1"
timeout = 20
retry_wait_time = 2
accept = ["200", "429"]
insecure = false
scheme = ["https"]
require_https = false
method = ["head", "get"]
header = { "accept" = "text/html", "x-custom-header" = "value" }
remap = ["https://example.com http://example.invalid"]
fallback_extensions = ["md", "html"]
base_url = "https://example.com"
root_dir = "/dist"
basic_auth = ["example.com user:pwd"]
include_fragments = "full"
min_tls = "TLSv1_3"

skip_missing = false
hidden = true
no_ignore = true
include_verbatim = false
glob_ignore_case = false
exclude = ['^https://example\.com/home$', '^https?://example\.com']
exclude_path = ["\\.txt$", "(^|/)test/"]
extensions = ["md", "txt", "html"]
include = ['gist\.github\.com.*']
exclude_all_private = false
exclude_private = false
exclude_link_local = false
exclude_loopback = false
include_mail = true
include_wikilinks = true
offline = true

files_from = "fixtures/empty-file.txt"
generate = "man"
archive = "wayback"
suggest = true

host_concurrency = 5
host_request_interval = "50ms"

[hosts."blog.example.com"]
concurrency = 5
request_interval = "0"
headers = { "A" = "B" }
